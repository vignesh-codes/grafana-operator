apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: default
  labels:
    dashboards: grafana
spec:
  version: 12.1.0
  ingress:
    spec:
      ingressClassName: nginx
      rules:
        - host: grafana.127.0.0.1.nip.io
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: grafana-service
                    port:
                      number: 3000
  config:
    security:
      admin_user: root
      admin_password: secret
    # auth:
    #   disable_login_form: false
  client:
    preferIngress: false
